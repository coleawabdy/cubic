name: Pull Request
on:
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        uses: ./.github/actions/configure
        with:
          mode: debug 
      
      - name: Build
        run: xmake build --verbose
      
      - name: Test
        run: xmake test
  
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitlint
        run: python -m pip install gitlint
      
      - name: Configure
        uses: ./.github/actions/configure
        with:
          mode: debug

      - name: Build
        run: xmake build --verbose
      
      - name: Lint
        run: xmake check clang.tidy
      
      - name: Format
        run: xmake format --dry-run --all --error

      - name: Check commits
        run: gitlint --commits "${{ github.event.pull_request.base.sha }}..HEAD"
